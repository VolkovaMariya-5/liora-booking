<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Liora — Redesign</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  button { font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="liora-b2c.jsx"></script>
<script type="text/babel" src="liora-b2b.jsx"></script>

<script type="text/babel">
  function Scrollable({ children, width, height }) {
    return (
      <div style={{ width, height, overflow: 'auto', background: '#fff' }}>
        <div style={{ width: '100%', minHeight: '100%' }}>{children}</div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="liora-b2c" title="Лендинг для клиентов (B2C)" subtitle="По мотивам DIKIDI — поиск-first, категории с фото, премиум, каталог">
          <DCArtboard id="b2c-desktop" label="Desktop · 1440" width={1440} height={900}>
            <Scrollable width={1440} height={900}>
              <LioraForYouDesktop />
            </Scrollable>
          </DCArtboard>
          <DCArtboard id="b2c-mobile" label="Mobile · 390" width={390} height={900}>
            <Scrollable width={390} height={900}>
              <LioraForYouMobile />
            </Scrollable>
          </DCArtboard>
        </DCSection>

        <DCSection id="liora-b2b" title="Лендинг для бизнеса (B2B)" subtitle="По мотивам DIKIDI Business — тёмный hero, дашборд, статистика, тарифы">
          <DCArtboard id="b2b-desktop" label="Desktop · 1440" width={1440} height={900}>
            <Scrollable width={1440} height={900}>
              <LioraBusinessDesktop />
            </Scrollable>
          </DCArtboard>
          <DCArtboard id="b2b-mobile" label="Mobile · 390" width={390} height={900}>
            <Scrollable width={390} height={900}>
              <LioraBusinessMobile />
            </Scrollable>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
